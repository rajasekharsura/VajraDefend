# /etc/apache2/sites-available/mysite.conf
# For Ubuntu/Debian — on Amazon Linux use /etc/httpd/conf.d/mysite.conf

# ─────────────────────────────────────────────
# VirtualHost: HTTP (port 80) — Public EC2 IP
# ─────────────────────────────────────────────
<VirtualHost *:80>
    ServerAdmin  webmaster@localhost
    DocumentRoot /var/www/html

    # Uncomment and set your domain if you have one:
    # ServerName   yourdomain.com
    # ServerAlias  www.yourdomain.com

    DirectoryIndex index.php index.html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # PHP error logging (don't display errors in production)
    php_flag  display_errors Off
    php_value error_log /var/log/apache2/php_errors.log

    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

# ─────────────────────────────────────────────
# VirtualHost: Tor Hidden Service (port 80 on localhost)
# Tor forwards .onion traffic to 127.0.0.1:80
# ─────────────────────────────────────────────
<VirtualHost 127.0.0.1:80>
    ServerAdmin  webmaster@localhost
    DocumentRoot /var/www/html

    # Paste your .onion address here after generating it
    # ServerName   youronionaddress.onion

    DirectoryIndex index.php index.html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Strip IP-leaking headers for Tor users
    Header unset X-Forwarded-For
    Header unset Via
    Header unset Server

    ErrorLog  ${APACHE_LOG_DIR}/tor_error.log
    CustomLog ${APACHE_LOG_DIR}/tor_access.log combined
</VirtualHost>

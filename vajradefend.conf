# /etc/apache2/sites-available/vajradefend.conf
# Replace 'vajradefend.com' with your actual domain once purchased

<VirtualHost *:80>
    ServerName  vajradefend.com
    ServerAlias www.vajradefend.com
    DocumentRoot /var/www/html

    DirectoryIndex index.html index.php

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Once you have SSL, uncomment to force HTTPS:
    # RewriteEngine On
    # RewriteCond %{HTTPS} off
    # RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

    php_flag  display_errors Off
    php_value error_log /var/log/apache2/vajradefend_php.log

    ErrorLog  ${APACHE_LOG_DIR}/vajradefend_error.log
    CustomLog ${APACHE_LOG_DIR}/vajradefend_access.log combined
</VirtualHost>

